name: Release and Update Homebrew

on:
  push:
    tags:
      - 'v*' # Triggers on tags like v1.0.0

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Application
        run: |
          swift build -c release
          mkdir -p build/SwiftPicker.app/Contents/MacOS
          cp .build/release/SwiftPicker build/SwiftPicker.app/Contents/MacOS/SwiftPicker
          cp Resources/Info.plist build/SwiftPicker.app/Contents/Info.plist

      - name: Package Application
        run: |
          cd build
          zip -r ../SwiftPicker.app.zip SwiftPicker.app

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: SwiftPicker.app.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Tap
        if: success()
        run: |
          SHA256=$(shasum -a 256 SwiftPicker.app.zip | awk '{print $1}')
          VERSION=${GITHUB_REF#refs/tags/v}
          
          # This assumes you have a repo named 'homebrew-tap'
          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/indranandjha1993/homebrew-tap.git
          cd homebrew-tap
          
          # Update the formula
          sed -i '' "s/version \".*\"/version \"$VERSION\"/" Casks/swiftpicker.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"$SHA256\"/" Casks/swiftpicker.rb
          sed -i '' "s|url \".*\"|url \"https://github.com/indranandjha1993/SwiftPicker/releases/download/v$VERSION/SwiftPicker.app.zip\"|" Casks/swiftpicker.rb
          
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add Casks/swiftpicker.rb
          git commit -m "Update SwiftPicker to v$VERSION"
          git push
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
